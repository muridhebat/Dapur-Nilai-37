<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dapur Nilai 37</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9805/9805578.png" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body { 
      width: 100%; 
      height: 100%; 
      background: #FFFFF0; 
      font-family: 'Segoe UI', sans-serif; 
      overflow: hidden; 
    }
    
    .container { 
      width: 100%; 
      height: 100vh; 
      height: -webkit-fill-available; 
      display: flex; 
      flex-direction: column; 
    }
    
    .iframe-container { 
      flex: 1; 
      width: 100%; 
      height: 100%; 
      position: relative; 
      overflow: hidden; 
    }
    
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      background: #f1f5f9; 
    }

    /* ========================================
       LOADING SCREEN (OVERLAY KOSONG)
       ======================================== */
    .loading { 
      position: fixed; 
      top: 0; 
      left: 0;
      width: 100%; 
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 50%, #dbeafe 100%);
      z-index: 10; 
      transition: opacity 0.5s ease;
    }

    .loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

  </style>
</head>
<body>
  <div class="container">
    
    <!-- Loading Screen (Kubus & Teks sudah dihapus) -->
    <div class="loading" id="loading">
      <!-- Dibiarkan kosong agar tidak menutupi loading bawaan dari iframe Dapur Nilai 37 -->
    </div>

    <div class="iframe-container">
      <!-- allow-popups-to-escape-sandbox: agar tab baru dari iframe TIDAK ter-sandbox -->
      <iframe id="appFrame" src="" allow="fullscreen; camera; microphone" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-modals allow-downloads"></iframe>
    </div>
  </div>

  <script>
    // =============================================
    // URL Google Apps Script Anda
    // =============================================
    var APP_URL = "https://script.google.com/macros/s/AKfycbxiNE1fTo55iK4N1LvMtslqofOFJZ_TwUet6zWy6BR-CJF7nj1_pQVg9O_tbOt6bwH_/exec";
    
    var appFrame = document.getElementById('appFrame');
    var loading = document.getElementById('loading');

    // =============================================
    // HANDLER REQUEST DARI IFRAME
    // =============================================
    window.addEventListener('message', function(event) {
      try {
        var data = event.data;
        if (!data || typeof data !== 'object') return;

        // 1. Buka tab kosong atas nama parent (user gesture masih aktif)
        if (data.action === 'openBlank') {
          window.open('', '_blank');
          return;
        }

        // 2. Buka URL langsung dari parent (fallback jika langsung berhasil)
        if (data.action === 'openDownload' && data.url) {
          window.open(data.url, '_blank');
          return;
        }

        // 3. Fullscreen dari parent document
        if (data.action === 'requestFullscreen') {
          var el = document.documentElement;
          var fn = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
          if (fn) fn.call(el).catch(function(){});
          return;
        }
      } catch(e) {
        console.warn('PostMessage error:', e);
      }
    });

    // =============================================
    // LOGIKA DELAY (Diubah ke 0 agar loading iframe langsung terlihat)
    // =============================================
    var startTime = Date.now();
    var MIN_LOAD_TIME = 0; // Diubah dari 6000 ke 0
    
    function loadApp() {
      var fullUrl = window.location.href;
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id');
      
      var targetUrl = APP_URL;
      
      if (id) {
        if (targetUrl.indexOf('?') !== -1) {
             targetUrl += "&id=" + id;
        } else {
             targetUrl += "?id=" + id;
        }
      }
      
      appFrame.src = targetUrl;
    }
    
    function hideLoading() {
      loading.classList.add('hidden');
    }

    appFrame.addEventListener('load', function() {
      var elapsedTime = Date.now() - startTime;
      var remainingTime = MIN_LOAD_TIME - elapsedTime;

      if (remainingTime > 0) {
        setTimeout(hideLoading, remainingTime);
      } else {
        hideLoading();
      }
    });
    
    window.addEventListener('DOMContentLoaded', loadApp);
  </script>
</body>
</html>
